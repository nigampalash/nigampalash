name: Update GitHub Profile Stats

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Stats Generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_profile_assets.py
          python scripts/generate_stats.py
          python scripts/generate_tools.py

      - name: Commit and Push SVG Card
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github_stats.svg assets/languages_tools.svg assets/focus_areas.svg assets/current_goals.svg assets/icons/*.svg
          git diff-index --quiet HEAD || (git commit -m "auto: Update GitHub stats card and profile assets" && git push)
