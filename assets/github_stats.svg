      100% { font-size: 28px; opacity: 1; }
    }
    @keyframes fadein {
      0% { opacity: 0; } 100% { opacity: 1; }
    }
    @keyframes pulse {
      0%,100% { opacity: 0.6; transform: scale(0.95); }
      50% { opacity: 0.3; transform: scale(1.05); }
