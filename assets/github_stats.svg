<svg xmlns="http://www.w3.org/2000/svg" width="560px" height="560px" viewBox="0 0 560 560" direction="ltr">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#13141f;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1b2e;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#BF91F3;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#70A5FD;stop-opacity:1" />
        </linearGradient>
        <filter id="glow-grade">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="glow-streak">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <clipPath id="card-clip">
            <rect width="560" height="560" rx="16" ry="16"/>
        </clipPath>
        <clipPath id="bar-clip">
            <rect x="30" y="50" width="500" height="10" rx="5" />
        </clipPath>
    </defs>
    
    <style>
        @keyframes currstreak {
            0% { font-size: 3px; opacity: 0.2; }
            80% { font-size: 34px; opacity: 1; }
            100% { font-size: 28px; opacity: 1; }
        }
        @keyframes fadein {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        @keyframes pulse-ring {
            0% { opacity: 0.8; transform: scale(0.95); }
            50% { opacity: 0.4; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(0.95); }
        }
        @keyframes shimmer {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .title {
            fill: url(#headerGrad);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Ubuntu, sans-serif;
            font-weight: 800;
            font-size: 17px;
            letter-spacing: 0.3px;
        }
        .stat-label {
            fill: #8B97C8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Ubuntu, sans-serif;
            font-size: 13.5px;
            font-weight: 500;
        }
        .stat-value {
            fill: #E8ECF8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Ubuntu, sans-serif;
            font-size: 13.5px;
            font-weight: 700;
        }
        .section-divider {
            stroke: #252640;
            stroke-width: 1;
        }
        .streak-label {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Ubuntu, sans-serif;
            font-weight: 700;
            font-size: 12px;
        }
        .streak-range {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Ubuntu, sans-serif;
            font-weight: 400;
            font-size: 11px;
            fill: #565F89;
        }
    </style>
    
    <!-- Card Background -->
    <rect width="560" height="560" rx="16" ry="16" fill="url(#bgGrad)" />
    <!-- Subtle border -->
    <rect width="559" height="559" x="0.5" y="0.5" rx="16" ry="16" fill="none" stroke="#2A2C45" stroke-width="1" />
    <!-- Top accent stripe -->
    <rect width="560" height="3" rx="1" fill="url(#headerGrad)" opacity="0.8"/>
    
    <!-- === HEADER === -->
    <g transform="translate(28, 42)">
        <!-- Icon -->
        <g transform="translate(0, -16)">
            <rect width="28" height="28" rx="6" fill="#1F2240"/>
            <g transform="translate(4, 4) scale(0.83)">
                <path d="M 0 12 L 5 12 L 5 -2 L 0 -2 Z M 8 12 L 13 12 L 13 -14 L 8 -14 Z M 16 12 L 21 12 L 21 2 L 16 2 Z" fill="url(#headerGrad)"/>
            </g>
        </g>
        <text x="38" y="2" class="title">My GitHub Statistics</text>
    </g>
    
    <!-- === SECTION 1: Key Statistics === -->
    <g transform="translate(28, 72)">
        
        <g transform="translate(0, 0)">
            <g transform="translate(0, -8) scale(0.75)">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01z" fill="#FFD43B" opacity="0.9"/>
            </g>
            <text x="22" y="4" class="stat-label">Total Stars:</text>
            <text x="185" y="4" class="stat-value">0</text>
        </g>

        <g transform="translate(0, 34)">
            <g transform="translate(0, -8) scale(0.75)">
                <path d="M9 3v11.17L5.41 10.58 4 12l6 6 6-6-1.41-1.41L11 14.17V3H9zm-4 16h14v2H5z" fill="#38BDAE" opacity="0.9"/>
            </g>
            <text x="22" y="4" class="stat-label">Total Commits:</text>
            <text x="185" y="4" class="stat-value">0</text>
        </g>

        <g transform="translate(0, 68)">
            <g transform="translate(0, -8) scale(0.75)">
                <path d="M6 3a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm0 8c2.67 0 8 1.34 8 4v2H-2v-2c0-2.66 5.33-4 8-4zm12-5h-4v2h4v4h2v-4h4v-2h-4V2h-2v4z" fill="#70A5FD" opacity="0.9"/>
            </g>
            <text x="22" y="4" class="stat-label">Total PRs:</text>
            <text x="185" y="4" class="stat-value">5</text>
        </g>

        <g transform="translate(0, 102)">
            <g transform="translate(0, -8) scale(0.75)">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#FF9E64" opacity="0.9"/>
            </g>
            <text x="22" y="4" class="stat-label">Total Issues:</text>
            <text x="185" y="4" class="stat-value">2</text>
        </g>

        <g transform="translate(0, 136)">
            <g transform="translate(0, -8) scale(0.75)">
                <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="#BF91F3" opacity="0.9"/>
            </g>
            <text x="22" y="4" class="stat-label">Contributed to:</text>
            <text x="185" y="4" class="stat-value">4</text>
        </g>
        
        <!-- Grade Badge -->
        <g transform="translate(385, 32)">
            <!-- Outer glow ring (animated) -->
            <circle cx="45" cy="45" r="48" fill="none" stroke="#70A5FD" stroke-width="1" opacity="0.25" style="animation: pulse-ring 3s ease-in-out infinite;"/>
            <!-- Main ring -->
            <circle cx="45" cy="45" r="42" fill="#1A1C32" stroke="#70A5FD" stroke-width="3" opacity="0.9" filter="url(#glow-grade)" style="animation: fadein 0.5s linear forwards 0.3s"/>
            <!-- Inner accent ring -->
            <circle cx="45" cy="45" r="36" fill="none" stroke="#70A5FD" stroke-width="0.8" opacity="0.3"/>
            <!-- Grade text -->
            <text x="45" y="56" fill="#70A5FD" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif" font-weight="800" font-size="32px" text-anchor="middle" filter="url(#glow-grade)" style="animation: fadein 0.5s linear forwards 0.5s">
                C
            </text>
        </g>
    </g>
    
    <!-- Section Divider -->
    <line x1="28" y1="256" x2="532" y2="256" class="section-divider"/>
    
    <!-- === SECTION 2: Streaks === -->
    <g transform="translate(0, 265)">
        <!-- Current Streak box -->
        <g transform="translate(0, 0)">
            <rect x="18" y="8" width="240" height="100" rx="10" fill="#17192C" stroke="#252640" stroke-width="1"/>
            <g transform="translate(138, 62)">
                <!-- Fire Icon -->
                <g transform="translate(-12, -52)">
                    <path d="M 1.5 0.67 C 1.5 0.67 2.24 3.32 2.24 5.47 C 2.24 7.53 0.89 9.2 -1.17 9.2 C -3.23 9.2 -4.79 7.53 -4.79 5.47 L -4.76 5.11 C -6.78 7.51 -8 10.62 -8 13.99 C -8 18.41 -4.42 22 0 22 C 4.42 22 8 18.41 8 13.99 C 8 8.6 5.41 3.79 1.5 0.67 Z M -0.29 19 C -2.07 19 -3.51 17.6 -3.51 15.86 C -3.51 14.24 -2.46 13.1 -0.7 12.74 C 1.07 12.38 2.9 11.53 3.92 10.16 C 4.31 11.45 4.51 12.81 4.51 14.2 C 4.51 16.85 2.36 19 -0.29 19 Z" fill="#FF9E64" filter="url(#glow-streak)"/>
                </g>
                <!-- Number circle -->
                <circle cx="0" cy="5" r="26" fill="none" stroke="#BF91F3" stroke-width="3" filter="url(#glow-streak)"/>
                <text x="0" y="15" fill="#BF91F3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif" font-weight="700" font-size="26px" text-anchor="middle" filter="url(#glow-streak)" style="animation: currstreak 0.6s linear forwards">
                    11
                </text>
                <text x="0" y="55" class="streak-label" fill="#BF91F3" text-anchor="middle">Current Streak</text>
                <text x="0" y="72" class="streak-range" text-anchor="middle">Jul 12 - Jul 22</text>
            </g>
        </g>
        
        <!-- Longest Streak box -->
        <g transform="translate(302, 0)">
            <rect x="0" y="8" width="240" height="100" rx="10" fill="#17192C" stroke="#252640" stroke-width="1"/>
            <g transform="translate(120, 62)">
                <!-- Trophy icon -->
                <g transform="translate(-12, -52)">
                    <path d="M 5 0 L 19 0 L 19 2 L 21 2 C 22.1 2 23 2.9 23 4 L 23 7 C 23 9.44 21.28 11.48 19 11.9 L 19 14 C 19 15.1 18.1 16 17 16 L 15 16 L 15 18 L 18 18 L 18 20 L 6 20 L 6 18 L 9 18 L 9 16 L 7 16 C 5.9 16 5 15.1 5 14 L 5 11.9 C 2.72 11.48 1 9.44 1 7 L 1 4 C 1 2.9 1.9 2 3 2 L 5 2 Z M 3 4 L 3 7 L 5 7 L 5 4 Z M 19 7 L 21 7 L 21 4 L 19 4 Z" fill="#FFD43B" opacity="0.9"/>
                </g>
                <text x="0" y="15" fill="#70A5FD" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif" font-weight="700" font-size="26px" text-anchor="middle" filter="url(#glow-streak)">
                    11
                </text>
                <text x="0" y="55" class="streak-label" fill="#70A5FD" text-anchor="middle">Longest Streak</text>
                <text x="0" y="72" class="streak-range" text-anchor="middle">Jul 12 - Jul 22</text>
            </g>
        </g>
    </g>
    
    <!-- Section Divider -->
    <line x1="28" y1="388" x2="532" y2="388" class="section-divider"/>
    
    <!-- === SECTION 3: Programming Languages === -->
    <g transform="translate(0, 397)">
        <text x="28" y="28" class="title">Programming Languages</text>
        
        <!-- Progress Bar Background (Rounded Track) -->
        <rect x="30" y="50" width="500" height="10" fill="#1F2240" rx="5" />
        
        <!-- Progress Bar Segments -->
        <g clip-path="url(#bar-clip)">
            
        </g>
        
        <!-- Legend Grid -->
        
    </g>
</svg>
